# ================================================================
# Netlify Deployment Config
# ================================================================
[build]
  base    = "frontend"
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"

# React Router - redirect all routes to index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# API calls proxy to backend (optional - only if same domain)
# If using separate Render backend, set REACT_APP_API_URL instead
# [[redirects]]
#   from = "/api/*"
#   to   = "https://your-backend.onrender.com/api/:splat"
#   status = 200
#   force  = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
